# Placeholder -> computed value mapping used by fill_placeholders().
# Values listed here are for documentation; the actual computation
# lives in R/write_manuscript.R::fill_placeholders().

policy:
  "[XX_POLICY_DELTA_EVENT]":    "abs(delta_event median, group='all')"
  "[XX_POLICY_DELTA_CI_LO]":    "delta_event ci_lo, group='all'"
  "[XX_POLICY_DELTA_CI_HI]":    "delta_event ci_hi, group='all'"

compliance:
  "[XX_COMPLIANCE_A]":   "compute_compliance_index() median for policy A scenario"
  "[XX_COMPLIANCE_B]":   "compute_compliance_index() median for policy B scenario"

autonomy:
  "[XX_OPTIMAL_AL]":     "al_efficiency()$optimal_al"

baseline:
  "[XX_EVENT_BASELINE]": "median event rate at baseline scenario (pct)"
  "[XX_EVENT_BEST]":     "minimum median event rate across scenarios (pct)"
